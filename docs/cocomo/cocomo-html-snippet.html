<!--
  cocomo-html-snippet.html
  ─────────────────────────────────────────────────────────────────────────────
  Drop this block into your main dashboard/page template wherever the COCOMO
  tab/section should appear.

  Prerequisites (already in your base layout):
    • <link rel="stylesheet" href="/css/main.css">
    • <link rel="stylesheet" href="/css/cocomo.css">   ← add this line
    • <script src="/js/api.js"></script>
    • <script src="/js/cocomo.js"></script>             ← add this line
    • Font Awesome (for trash icon)
-->

<section class="cocomo-section" id="cocomo-section" role="region" aria-labelledby="cocomo-heading">

  <h2 id="cocomo-heading">COCOMO Estimation</h2>

  <!-- Error Banner -->
  <div id="cocomo-error" class="cocomo-error hidden" role="alert" aria-live="polite"></div>

  <!-- ── Input Form Card ──────────────────────────────────────────────────── -->
  <div class="cocomo-card">
    <h3>New Estimation</h3>

    <form id="cocomo-form" novalidate>
      <div class="cocomo-form-grid">

        <!-- KLOC -->
        <div class="cocomo-field">
          <label for="cocomo-kloc">KLOC <span aria-hidden="true">*</span></label>
          <input
            type="number"
            id="cocomo-kloc"
            name="kloc"
            min="0.1"
            step="0.1"
            placeholder="e.g. 12.5"
            required
            aria-describedby="cocomo-kloc-hint"
          >
          <span id="cocomo-kloc-hint" class="cocomo-field-hint">Thousands of lines of code</span>
        </div>

        <!-- Project Type -->
        <div class="cocomo-field">
          <label for="cocomo-project-type">Project Type <span aria-hidden="true">*</span></label>
          <select id="cocomo-project-type" name="projectType" required>
            <option value="" disabled selected>Select type…</option>
            <option value="organic">Organic</option>
            <option value="semidetached">Semi-detached</option>
            <option value="embedded">Embedded</option>
          </select>
        </div>

        <!-- Team Size -->
        <div class="cocomo-field">
          <label for="cocomo-team-size">Team Size <span aria-hidden="true">*</span></label>
          <input
            type="number"
            id="cocomo-team-size"
            name="teamSize"
            min="1"
            step="1"
            placeholder="e.g. 5"
            required
          >
        </div>

        <!-- Optional Label -->
        <div class="cocomo-field">
          <label for="cocomo-label">Label <span style="font-weight:400;opacity:.6;">(optional)</span></label>
          <input
            type="text"
            id="cocomo-label"
            name="label"
            maxlength="80"
            placeholder="e.g. Phase 1 backend"
          >
        </div>

      </div><!-- /.cocomo-form-grid -->

      <!-- Actions -->
      <div class="cocomo-actions">
        <button type="submit" id="cocomo-calc-btn" class="btn btn--primary">
          Calculate
        </button>
        <span id="cocomo-loading" class="cocomo-loading-spinner hidden" aria-live="polite">
          <i class="fas fa-circle-notch fa-spin"></i> Calculating…
        </span>
      </div>

    </form>
  </div><!-- /.cocomo-card -->

  <!-- ── Result Card (hidden until first calculation) ─────────────────────── -->
  <div id="cocomo-result" class="cocomo-result-card hidden" aria-live="polite">
    <h3>Estimation Result</h3>
    <div class="cocomo-result-grid">

      <div class="cocomo-metric">
        <div class="cocomo-metric__label">Effort</div>
        <div id="cocomo-effort" class="cocomo-metric__value">—</div>
      </div>

      <div class="cocomo-metric">
        <div class="cocomo-metric__label">Duration</div>
        <div id="cocomo-duration" class="cocomo-metric__value">—</div>
      </div>

      <div class="cocomo-metric">
        <div class="cocomo-metric__label">Required Staffing</div>
        <div id="cocomo-staffing" class="cocomo-metric__value">—</div>
      </div>

    </div>
  </div><!-- /#cocomo-result -->

  <!-- ── Estimation History ────────────────────────────────────────────────── -->
  <div id="cocomo-history-section" class="cocomo-history-section hidden">
    <h3>Estimation History</h3>
    <ul id="cocomo-history-list" class="cocomo-history-list" aria-label="Past estimations">
      <!-- Populated by cocomo.js -->
    </ul>
  </div>

</section><!-- /#cocomo-section -->
